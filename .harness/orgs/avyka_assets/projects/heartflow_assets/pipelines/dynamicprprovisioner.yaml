pipeline:
  name: dynamic-pr-provisioner
  identifier: dynamicprprovisioner
  projectIdentifier: heartflow_assets
  orgIdentifier: avyka_assets
  tags: {}
  stages:
    - stage:
        name: Deploy to Dev
        identifier: Deploy_to_Dev
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: deployment_service
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: Dev
            deployToAll: false
            provisioner:
              steps:
                - step:
                    type: ShellScriptProvision
                    name: Create Namespace
                    identifier: Create_Namespace
                    spec:
                      source:
                        type: Inline
                        spec:
                          script: |-
                            # 1. Capture the PR Number from the trigger
                            PR_NUM="<+trigger.prNumber>"

                            # 2. Construct the dynamic namespace name
                            export DYNAMIC_NS="demo-service-pr-$PR_NUM"

                            # 3. Check if namespace exists, if not, create it
                            if kubectl get namespace "$DYNAMIC_NS" > /dev/null 2>&1; then
                              echo "Namespace $DYNAMIC_NS already exists. Skipping creation."
                            else
                              echo "Namespace $DYNAMIC_NS not found. Creating it now..."
                              kubectl create namespace "$DYNAMIC_NS"
                            fi

                            # 4. HARNESS MAGIC: Write to the output path in JSON format
                            # This must run EVERY time (even if the namespace already existed) 
                            # so the Infrastructure Mapping always has a value to read.
                            echo "{\"new_ns\": \"$DYNAMIC_NS\"}" > "$PROVISIONER_OUTPUT_PATH"

                            echo "Namespace name successfully exported to Harness: $DYNAMIC_NS"
                      environmentVariables: []
                    timeout: 10m
              rollbackSteps: []
            infrastructureDefinitions:
              - identifier: Dev
                inputs:
                  identifier: Dev
                  type: KubernetesDirect
                  spec:
                    provisioner: <+input>
          execution:
            steps:
              - step:
                  name: Stage Deployment
                  identifier: stageDeployment
                  type: K8sBlueGreenDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
              - step:
                  name: Swap primary with stage service
                  identifier: bgSwapServices
                  type: K8sBGSwapServices
                  timeout: 10m
                  spec:
                    skipDryRun: false
            rollbackSteps:
              - step:
                  name: Swap primary with stage service
                  identifier: rollbackBgSwapServices
                  type: K8sBGSwapServices
                  timeout: 10m
                  spec:
                    skipDryRun: false
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
